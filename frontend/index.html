<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/images/1.png" />

    <!-- META TAGS CRITIQUES POUR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7C3AED">
    <meta name="HandheldFriendly" content="true">
    <meta name="format-detection" content="telephone=no">

    <title>OCTOGO - Neurosciences Appliquées</title>
    <meta name="description" content="Premier cabinet tunisien spécialisé en neurosciences appliquées à l'éducation, la formation et le travail">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Styles critiques pour mobile -->
    <style>
        /* RESET MOBILE CRITIQUE */
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        body {
            position: relative;
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            overflow-x: hidden;
        }
        
        #root {
            width: 100%;
            min-height: 100vh;
            position: relative;
        }
        /* Animation spin pour le chargement */
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* Prévenir le zoom sur mobile */
        
        input,
        select,
        textarea {
            font-size: 16px;
        }
        /* Styles pour les liens et boutons mobiles */
        
        a,
        button {
            min-height: 44px;
            min-width: 44px;
        }
        /* Loading screen */
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #7C3AED, #C084FC);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        /* ===== NOUVELLE FLÈCHE RETOUR EN HAUT (À GAUCHE) ===== */
        
        #scroll-to-top-left {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #C084FC);
            border: none;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            cursor: pointer;
            display: none;
            /* Caché par défaut */
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.3s ease;
            color: white;
            font-size: 24px;
            padding: 0;
            animation: fadeInUp 0.3s ease;
        }
        
        #scroll-to-top-left:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
        }
        
        #scroll-to-top-left:active {
            transform: scale(0.95);
        }
        /* Animation d'apparition */
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Version mobile */
        
        @media (max-width: 768px) {
            #scroll-to-top-left {
                bottom: 20px;
                left: 20px;
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
        /* Cache l'ancienne flèche si elle existe */
        
        .old-scroll-arrow,
        button:has(.bi-arrow-up):not(#scroll-to-top-left):not(:has(.bi-chat)) {
            display: none !important;
        }
        /* Styles pour le chatbot - version mobile */
        
        @media screen and (max-width: 768px) {
            body {
                touch-action: pan-y;
            }
            img,
            video,
            iframe {
                max-width: 100%;
                height: auto;
            }
            h1 {
                font-size: 1.75rem !important;
            }
            h2 {
                font-size: 1.5rem !important;
            }
            h3 {
                font-size: 1.25rem !important;
            }
            .chatbot-container {
                width: 100% !important;
                right: 0 !important;
                bottom: 0 !important;
                border-radius: 15px 15px 0 0 !important;
                height: 80vh !important;
            }
        }
        /* Animation pour le chatbot */
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* Style pour la barre de défilement du chatbot */
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #7C3AED;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #6D28D9;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- NOUVELLE FLÈCHE RETOUR EN HAUT (AJOUTÉE DIRECTEMENT DANS LE BODY) -->
    <button id="scroll-to-top-left" onclick="scrollToTop()" aria-label="Retour en haut">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Script pour la nouvelle flèche et autres fonctionnalités -->
    <script>
        // ===== NOUVELLE FLÈCHE RETOUR EN HAUT =====
        const scrollButton = document.getElementById('scroll-to-top-left');

        // Fonction pour remonter en haut
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Afficher/cacher la flèche selon le scroll
        function toggleScrollButton() {
            if (window.scrollY > 300) {
                scrollButton.style.display = 'flex';
            } else {
                scrollButton.style.display = 'none';
            }
        }

        // Ajouter l'écouteur d'événement pour le scroll
        window.addEventListener('scroll', toggleScrollButton);

        // Vérifier au chargement de la page
        window.addEventListener('load', toggleScrollButton);

        // ===== CACHER L'ANCIENNE FLÈCHE =====
        function hideOldArrow() {
            // Cache tous les boutons avec bi-arrow-up qui ne sont pas notre nouvelle flèche
            const oldArrows = document.querySelectorAll('.bi-arrow-up');
            oldArrows.forEach(arrow => {
                const parent = arrow.parentElement;
                if (parent && parent.id !== 'scroll-to-top-left') {
                    // Cacher le parent (le bouton)
                    if (parent.tagName === 'BUTTON') {
                        parent.style.display = 'none';
                    }
                    // Ou cacher l'élément lui-même
                    arrow.style.display = 'none';
                }
            });

            // Cache aussi les boutons avec position fixed qui pourraient être l'ancienne flèche
            const allButtons = document.querySelectorAll('button');
            allButtons.forEach(button => {
                const style = window.getComputedStyle(button);
                if (style.position === 'fixed' && style.bottom === '30px' && button.id !== 'scroll-to-top-left') {
                    // Vérifie si c'est probablement une flèche
                    if (button.innerHTML.includes('arrow') || button.querySelector('.bi-arrow-up')) {
                        button.style.display = 'none';
                    }
                }
            });
        }

        // Exécuter après un petit délai pour laisser le temps au DOM de se charger
        setTimeout(hideOldArrow, 500);

        // Réexécuter quand le DOM change (au cas où React ajoute des éléments après)
        const observer = new MutationObserver(hideOldArrow);
        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        // ===== FIX POUR iOS =====
        function setAppHeight() {
            const doc = document.documentElement;
            doc.style.setProperty('--app-height', `${window.innerHeight}px`);

            const root = document.getElementById('root');
            if (root) {
                root.style.minHeight = `${window.innerHeight}px`;
            }
        }

        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', setAppHeight);
        setAppHeight();

        // Empêcher le zoom avec double-tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Pour tous les appareils
        document.body.style.overflowX = 'hidden';
    </script>
</body>

</html>
